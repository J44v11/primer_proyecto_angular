<div class="contenedor">
  <h1>🛒 Mi Lista de la Compra</h1>

  <div class="caja-entrada">
    <input type="text" #inputProducto placeholder="Ej. Manzanas, pan..." (keyup.enter)="agregar(inputProducto.value); inputProducto.value = ''">
    
    <button (click)="agregar(inputProducto.value); inputProducto.value = ''">
      Añadir
    </button>
  </div>

  <ul>
    @for (item of listaCompra; track $index) {
      <li>{{ item }}</li>
    } @empty {
      <p class="vacio">Tu lista está vacía. ¡Añade algo para empezar!</p>
    }
  </ul>
</div>
